name: Build Alpine ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  ALPINE_RELEASE: '3.21'

jobs:
  build-alpine:
    name: Alpine ISO (${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build Alpine ISO (${{ matrix.arch }})
        run: |
          mkdir -p dist
          ARCH=${{ matrix.arch }} \
          ALPINE_RELEASE=${{ env.ALPINE_RELEASE }} \
          OUTDIR="$GITHUB_WORKSPACE/dist" \
          sudo docker run --rm \
            --platform ${{ matrix.arch == 'aarch64' && 'linux/arm64' || 'linux/amd64' }} \
            -v "$GITHUB_WORKSPACE:/src" \
            -e ARCH \
            -e ALPINE_RELEASE \
            -e OUTDIR \
            alpine:3.21 \
            sh -c '
              apk add --no-cache alpine-sdk apk-tools alpine-conf bash curl ca-certificates git \
                xorriso squashfs-tools mtools dosfstools grub grub-efi efibootmgr e2fsprogs \
                qemu-img openssl
              if [ "$ARCH" = x86_64 ]; then apk add --no-cache syslinux; fi
              git config --global safe.directory "*"
              cd /src && bash scripts/build-alpine.sh
            '

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum colinux-lite-* > SHA256SUMS-${{ matrix.arch }}.txt
          cat SHA256SUMS-${{ matrix.arch }}.txt

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpine-iso-${{ matrix.arch }}
          path: |
            dist/colinux-lite-*.iso
            dist/colinux-lite-*.raw.img
            dist/SHA256SUMS-${{ matrix.arch }}.txt
            dist/SHA256SUMS
            dist/build-manifest.txt
            dist/build-manifest.json
          retention-days: 30
          if-no-files-found: error

      - name: Upload as release asset (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/colinux-lite-*.iso
            dist/colinux-lite-*.raw.img
            dist/SHA256SUMS-${{ matrix.arch }}.txt
            dist/build-manifest.txt
            dist/build-manifest.json
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # QEMU boot smoke test (ROADMAP v0.4 "GitHub Actions CI").
  # Boots the x86_64 ISO built above in QEMU and verifies via the serial
  # console that the system reaches a login prompt and the codex binary is
  # present. Depends on the build job so it only runs once an ISO exists.
  # KVM acceleration is auto-detected by test-iso.sh (ubuntu-latest exposes
  # /dev/kvm); falls back to slower TCG software emulation otherwise.
  # ──────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: QEMU smoke test (x86_64)
    runs-on: ubuntu-latest
    needs: build-alpine
    # Non-blocking until the colinux-lite ISO includes a kernel (issue #2:
    # https://github.com/gibavargas/colinux/issues/2). The current build
    # emits an 18 MB ISO with apks/, isolinux, and grub-efi, but NO
    # /boot/vmlinuz-* or /boot/initramfs-*, so section_kernels is failing
    # silently. The test infrastructure itself is functional — it correctly
    # catches the boot failure — so this job stays non-blocking and will
    # auto-pass once the kernel-inclusion bug is fixed. Remove this line then.
    continue-on-error: true
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read   # required to download the ISO artifact from the build job

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download x86_64 ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: alpine-iso-x86_64
          path: dist

      - name: Locate ISO
        id: iso
        run: |
          set -eu
          echo "Artifact contents:"
          ls -la dist
          ISO="$(find dist -type f -name 'colinux-lite-x86_64-*.iso' | head -1)"
          if [ -z "$ISO" ]; then
            echo "::error::No x86_64 ISO found in artifact" >&2
            exit 1
          fi
          echo "ISO path: $ISO"
          echo "size=$(du -h "$ISO" | cut -f1)" >> "$GITHUB_OUTPUT"
          echo "path=$ISO" >> "$GITHUB_OUTPUT"

      - name: Install QEMU + expect
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y qemu-system-x86 expect
          qemu-system-x86_64 --version | head -1
          expect -v

      - name: Report KVM availability
        run: |
          if [ -e /dev/kvm ] && [ -w /dev/kvm ]; then
            echo "kvm=available ($(ls -l /dev/kvm))"
          else
            echo "kvm=unavailable — boot will use TCG software emulation (slower)"
          fi

      - name: Run QEMU smoke test (serial console)
        # --memory 2048 speeds up boot; --timeout 420 gives TCG fallback headroom.
        run: |
          ./scripts/test-iso.sh \
            --iso "${{ steps.iso.outputs.path }}" \
            --arch x86_64 \
            --memory 2048 \
            --timeout 420

      - name: Upload serial + test logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-logs-x86_64
          path: |
            dist/serial-output.log
            dist/test-results.log
          if-no-files-found: ignore
          retention-days: 14
