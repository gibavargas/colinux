name: Build Alpine ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  ALPINE_RELEASE: '3.21'

jobs:
  build-alpine:
    name: Alpine ISO (${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build Alpine ISO (${{ matrix.arch }})
        run: |
          mkdir -p dist
          ARCH=${{ matrix.arch }} \
          ALPINE_RELEASE=${{ env.ALPINE_RELEASE }} \
          OUTDIR="$GITHUB_WORKSPACE/dist" \
          sudo docker run --rm \
            --platform ${{ matrix.arch == 'aarch64' && 'linux/arm64' || 'linux/amd64' }} \
            -v "$GITHUB_WORKSPACE:/src" \
            -e ARCH \
            -e ALPINE_RELEASE \
            -e OUTDIR \
            alpine:3.21 \
            sh -c "apk add --no-cache alpine-sdk apk-tools alpine-conf bash curl ca-certificates git xorriso squashfs-tools mtools dosfstools syslinux grub grub-efi efibootmgr e2fsprogs qemu-img openssl && git config --global safe.directory '*' && cd /src && bash scripts/build-alpine.sh"

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum colinux-lite-* > SHA256SUMS-${{ matrix.arch }}.txt
          cat SHA256SUMS-${{ matrix.arch }}.txt

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpine-iso-${{ matrix.arch }}
          path: |
            dist/colinux-lite-*.iso
            dist/colinux-lite-*.raw.img
            dist/SHA256SUMS-${{ matrix.arch }}.txt
          retention-days: 30
          if-no-files-found: error

      - name: Upload as release asset (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/colinux-lite-*.iso
            dist/colinux-lite-*.raw.img
            dist/SHA256SUMS-${{ matrix.arch }}.txt
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
