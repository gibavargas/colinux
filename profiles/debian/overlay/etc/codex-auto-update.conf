# /etc/codex-auto-update.conf
# CodexOS Desktop — Auto-update configuration
#
# Controls the periodic update checker for both the Codex Desktop
# Electron app and the Codex CLI binary.
#
# This file is read by codex-desktop-autoupdate and codex-system-autoupdate.

# Enable or disable automatic updates
ENABLED=true

# How often to check for updates (in hours)
# Valid values: 1, 2, 3, 4, 6, 8, 12, 24
INTERVAL=4

# Codex Desktop (Electron app) update channel
# Values: stable, preview
CODEX_DESKTOP_CHANNEL=stable

# Codex CLI binary update channel
# Values: stable, preview
CODEX_CLI_CHANNEL=stable

# codex-desktop-linux wrapper repo branch
WRAPPER_BRANCH=main

# Automatically install updates without prompting
# When false, a desktop notification is shown and the user must click to install
AUTO_INSTALL=false
auto_install=false

# Show desktop notification when updates are available
NOTIFY=true

# Number of rollback points to keep
ROLLBACK_COUNT=3

# System (Debian) update behavior
# Values: none, security-only, all
SYSTEM_UPDATES=security-only

# Log rotation: number of days to keep logs
LOG_ROTATE_DAYS=30

# Maximum log file size before rotation (bytes)
LOG_MAX_SIZE=10485760

# GitHub API rate-limit handling
# Delay in seconds between API calls to avoid rate limiting
API_DELAY=2
