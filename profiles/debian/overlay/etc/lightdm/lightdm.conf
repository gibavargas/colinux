# /etc/lightdm/lightdm.conf
# CoLinux Desktop — LightDM configuration
# Auto-login as the 'codex' user for seamless Codex Desktop experience.

[SeatDefaults]
# Greeter
greeter-session=lightdm-greeter
greeter-hide-users=false
greeter-show-manual-login=false

# Auto-login for the codex user
autologin-user=codex
autologin-user-timeout=0
autologin-session=xfce

# X server
user-session=xfce
allow-guest=false

# Display setup
xserver-command=Xorg
# Uncomment for HiDPI displays:
# xserver-layout=Xorg Layout
# display-setup-script=/usr/local/bin/codex-display-setup

[LightDM]
# Run directory
run-directory=/run/lightdm

[Seat:*]
greeter-session=lightdm-greeter
user-session=xfce
autologin-user=codex
autologin-user-timeout=0
session-wrapper=/etc/X11/Xsession

[XDMCPServer]
enabled=false

[VNCServer]
enabled=false
