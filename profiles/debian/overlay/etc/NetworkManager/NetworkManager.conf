# /etc/NetworkManager/NetworkManager.conf
# CodexOS Desktop — NetworkManager configuration
# Enables Wi-Fi, WWAN, and automatic connection management.

[main]
plugins=ifupdown,keyfile
dhcp=dhclient
no-auto-default=*

[ifupdown]
managed=true

[device]
wifi.scan-rand-mac-address=no

[connectivity]
uri=http://connectivity-check.ubuntu.com/
