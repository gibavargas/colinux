# CoLinux Desktop — Casper Persistence Configuration
# Configures encrypted persistence for the Debian live system.
# This file controls how the live system sets up the persistent overlay.
#
# Reference: https://wiki.debian.org/DebianLive/Persistence

# ── Persistent volume label ──
# The USB drive must have a partition labeled "codex-persist"
# Format: cryptsetup luksFormat /dev/sdX2 -L codex-persist
PERSISTENCE_LABEL="codex-persist"

# ── Persistence type ──
# overlay: Union filesystem overlay (changes persist)
# link:    Symbolic links to persistent files
PERSISTENCE_TYPE="overlay"

# ── Encrypted persistence ──
# If true, casper will look for a LUKS-encrypted partition
PERSISTENCE_ENCRYPT="true"

# ── LUKS key file ──
# Optional: Key file for auto-unlocking at boot
# If not set, user will be prompted for passphrase
# PERSISTENCE_KEYFILE="/persist/.luks-key"

# ── Persistence excludes ──
# Directories that should NOT be persisted (ephemeral)
CASPER_EXCLUDES="/tmp /var/tmp /var/cache/apt /var/lib/apt/lists /run /proc /sys /dev"

# ── Persistence includes ──
# These directories will be persisted across reboots
PERSISTENCE_INCLUDES="
    /home/codex
    /persist
    /var/lib/codex-desktop
    /etc/codex-auto-update.conf
    /etc/NetworkManager/system-connections
    /etc/ssh/ssh_host_*
    /var/log
"
