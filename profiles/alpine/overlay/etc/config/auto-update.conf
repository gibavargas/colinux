# /etc/config/auto-update.conf
# CodexOS Lite — Auto-update configuration
#
# Controls the periodic Codex CLI update checker.
# This file is sourced by the codex-auto-update OpenRC service.

# Enable or disable automatic Codex CLI updates
# Values: true, false
ENABLED=true

# How often to check for updates (in hours)
# Valid values: 1, 2, 3, 4, 6, 8, 12, 24
INTERVAL=6

# Update channel
# Values: stable, preview
CHANNEL=stable

# Automatically install updates without prompting
# When false, updates are downloaded but not installed (requires manual 'codexctl update')
AUTO_INSTALL=true

# Number of days to keep update logs before rotation
# Older logs are compressed with gzip
LOG_ROTATE_DAYS=30
