# =============================================================================
# CodexOS Lite — doas.conf
# =============================================================================
# Allows the 'codex' user to run specific codex-* commands as root without a
# password.  This keeps the system secure while letting Codex CLI perform
# privileged operations through whitelisted wrapper scripts.
# =============================================================================

permit nopass codex as root cmd codex-disk-inventory
permit nopass codex as root cmd codex-mount-ro
permit nopass codex as root cmd codex-mount-rw
permit nopass codex as root cmd codex-usb-persist
permit nopass codex as root cmd codex-install-usb
permit nopass codex as root cmd codex-install-pc
permit nopass codex as root cmd codex-network
permit nopass codex as root cmd codex-update
permit nopass codex as root cmd codex-backup
permit nopass codex as root cmd codex-logs
permit nopass codex as root cmd codexctl
