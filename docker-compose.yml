# CoLinux Lite — Docker Compose for development
version: "3.8"

services:
  colinux-lite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: colinux-lite
    stdin_open: true
    tty: true
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CODEX_VERSION=${CODEX_VERSION:-}
      - CODEX_WORKSPACE=/workspace
      - CODEX_PERSIST=/persist
    volumes:
      # Persist workspace and config across container restarts
      - colinux-workspace:/workspace
      - colinux-persist:/persist
      # Mount host disks for testing (comment out if not needed)
      # - /dev:/dev:ro
      # - /mnt:/mnt/disks:ro
    tmpfs:
      - /run/codex:size=10m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN  # Needed for mount operations in testing
    restart: unless-stopped

volumes:
  colinux-workspace:
  colinux-persist:
